{% load i18n %}
{% get_current_language as CURRENT_LANG %}
{% get_available_languages as LANGUAGES %}

<form action="{% url 'set_language' %}" method="post" class="flex items-center bg-slate-100/50 dark:bg-slate-800 p-1.5 py-2 rounded-xl border border-slate-200 dark:border-slate-700">
    {% csrf_token %}
    <input name="next" type="hidden" value="{{ request.get_full_path }}">
    {% for lang_code, lang_name in LANGUAGES %}
        <button type="submit" name="language" value="{{ lang_code }}" 
                class="px-2.5 py-1 text-[10px] font-bold rounded-lg transition-all {% if CURRENT_LANG == lang_code %}text-primary bg-white dark:bg-slate-900 shadow-sm ring-1 ring-slate-200 dark:ring-slate-700{% else %}text-slate-400 hover:text-slate-600 dark:hover:text-slate-300{% endif %}">
            {{ lang_code|upper }}
        </button>
    {% endfor %}
</form>
