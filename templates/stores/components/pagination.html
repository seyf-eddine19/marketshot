{% load i18n %}

<!-- COMPONENT: PRESERVED DYNAMIC PAGINATION FOOTER MODULE -->
{% if is_paginated %}
<nav class="flex items-center justify-between pt-6 border-t border-slate-100 dark:border-slate-900 text-xs">
    <div>
        <span class="text-slate-400 dark:text-slate-500 font-medium">
            {% trans "Showing page" %} <b class="text-slate-700 dark:text-slate-300">{{ page_obj.number }}</b> {% trans "of" %} {{ paginator.num_pages }}
        </span>
    </div>
    
    <div class="flex items-center gap-1.5">
        <!-- Backward Navigation Action Item Trigger -->
        {% if page_obj.has_previous %}
            <a href="?page={{ page_obj.previous_page_number }}{% for key, value in request.GET.items %}{% if key != 'page' %}&{{ key }}={{ value }}{% endif %}{% endfor %}" 
               class="px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900 font-bold text-slate-600 dark:text-slate-400 transition flex items-center gap-1">
                <span class="material-symbols-outlined text-sm rtl:rotate-180">arrow_back</span>
                <span>{% trans "Previous" %}</span>
            </a>
        {% endif %}

        <!-- Forward Navigation Action Item Trigger -->
        {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}{% for key, value in request.GET.items %}{% if key != 'page' %}&{{ key }}={{ value }}{% endif %}{% endfor %}" 
               class="px-4 py-2 rounded-xl bg-primary text-white font-bold shadow-md shadow-primary/10 hover:brightness-105 transition flex items-center gap-1">
                <span>{% trans "Next" %}</span>
                <span class="material-symbols-outlined text-sm rtl:rotate-180">arrow_forward</span>
            </a>
        {% endif %}
    </div>
</nav>
{% endif %}
